name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  linter:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Install gems
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install

      - name: Run RuboCop
        run: bundle exec rubocop

  tests:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6

      - name: Install gems
        run: |
          bundle config set --local path 'vendor/bundle'
          bundle install

      - name: Run RSpec
        run: bundle exec rspec
