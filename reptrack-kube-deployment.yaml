apiVersion: v1
kind: ConfigMap
metadata:
  name: reptrack-hosts-config
  namespace: reptrack
data:
  zz_hosts.rb: |
    Rails.application.config.assume_ssl = true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: reptrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reptrack
  namespace: reptrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reptrack
  template:
    metadata:
      labels:
        app: reptrack
    spec:
      imagePullSecrets:
        - name: dockerhub-key
      containers:
        - name: reptrack
          image: moindev/reptrack:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
          envFrom:
            - secretRef:
                name: reptrack-secrets
          env:
            - name: RAILS_ENV
              value: "staging"
          volumeMounts:
            - name: hosts-config
              mountPath: /rails/config/initializers/zz_hosts.rb
              subPath: zz_hosts.rb
              readOnly: true
      volumes:
        - name: hosts-config
          configMap:
            name: reptrack-hosts-config
---
apiVersion: v1
kind: Service
metadata:
  name: reptrack-service
  namespace: reptrack          # ← fixed: was "practify"
spec:
  selector:
    app: reptrack
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3001         # ← fixed: was 3001, should match containerPort
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: reptrack-ingress
  namespace: reptrack
  annotations:
    kubernetes.io/ingress.class: traefik
spec:
  rules:
    - host: reptrack.co.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reptrack-service  # ← fixed: was "practify-service"
                port:
                  number: 80
    - host: www.reptrack.co.in
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: reptrack-service
                port:
                  number: 80